name: Daily Vacancies

on:
  schedule:
    # 12:00, 13:00, 14:00 Europe/Moscow = 09:00, 10:00, 11:00 UTC.
    # Код дополнительно защищает от повторной публикации в тот же день.
    - cron: "0 9-11 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "fetch — парсинг; test — тест в канал; status — отчёт"
        required: true
        default: fetch
        type: choice
        options:
          - fetch
          - test
          - status

concurrency:
  group: daily-vacancies
  cancel-in-progress: false

jobs:
  post-vacancies:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore vacancies database
        uses: actions/cache@v4
        with:
          path: data/vacancies.db
          key: vacancies-db-v1-${{ github.run_id }}
          restore-keys: |
            vacancies-db-v1-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::Secret TELEGRAM_BOT_TOKEN не задан"
            missing=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Secret TELEGRAM_CHAT_ID не задан"
            missing=1
          fi
          exit $missing

      - name: Run bot
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HH_USER_AGENT: ${{ secrets.HH_USER_AGENT }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          TIMEZONE: Europe/Moscow
          MAX_VACANCY_AGE_HOURS: "72"
          SCHEDULE_SKIP_DATES: "2026-06-22"
        run: |
          mkdir -p data
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="fetch"
          fi
          echo "Running mode: $MODE (event=${{ github.event_name }})"
          python -m bot.run_once "$MODE"
